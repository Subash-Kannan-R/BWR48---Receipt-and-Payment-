# Location schemas - the report loops over every one of these, and each
# becomes one column in the output. Add/remove schema names here as your
# set of branches grows; no code changes needed.
# -------------------------------------------------------------------
dhanam.location.schemas=2526KFUrbanSellur_FA,2526KFDindigulShanarpatty_FA,2526KFSolapurUrban,2526KFUrbanArapalayam_FA
dhanam.location.jdbc-url-template=jdbc:mysql://127.0.0.1:3306/%s?useSSL=false&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8
dhanam.location.username=root
dhanam.location.password=
dhanam.location.driver-class-name=com.mysql.jdbc.Driver

